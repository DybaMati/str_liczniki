{% extends "base.html" %}
{% block content %}
<style>
.pv-header{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.pv-card{background:rgba(255,255,255,0.08);border-radius:6px;padding:10px 14px;flex:1;min-width:120px}
.pv-card-label{font-size:12px;color:#aaa;margin:0 0 2px}
.pv-card-value{font-size:22px;font-weight:500;margin:0}
.pv-time-stack .pv-d{font-size:clamp(14px,3.5vw,18px);line-height:1.2}
.pv-time-stack .pv-t{font-size:clamp(12px,3vw,14px);color:#888;margin-top:2px}
.pv-meta{color:#888;font-size:13px;margin-top:10px}
.pv-lastbar{margin-top:14px;background:rgba(255,255,255,0.05);border:1px solid #333;border-radius:8px;padding:10px 12px}
.pv-lastbar-title{font-size:12px;color:#aaa;margin-bottom:6px}
.pv-lastbar-grid{display:grid;grid-template-columns:repeat(4,minmax(130px,1fr));gap:8px 12px}
.pv-last-item b{display:block;font-size:12px;color:#ccc;font-weight:500}
.pv-last-item span{display:block;font-size:12px;color:#8f8f8f;line-height:1.3}
@media (max-width: 700px) {.pv-lastbar-grid{grid-template-columns:repeat(2,minmax(120px,1fr));}}
@media (max-width: 480px) {
  .pv-header{gap:8px}
  .pv-card{min-width:calc(50% - 6px);flex:1 1 140px}
  .pv-lastbar-grid{grid-template-columns:1fr;}
}
</style>

<h1 style="font-weight:600;font-size:1.2rem;margin:0 0 12px">Odczyt na żywo</h1>
<p class="pv-meta" id="pv-status">Ładowanie…</p>

<div class="pv-header">
  <div class="pv-card">
    <p class="pv-card-label">Czas odczytu</p>
    <div class="pv-card-value pv-time-stack" id="pv-time-wrap"><p class="pv-d" id="pv-time-d">—</p><p class="pv-t" id="pv-time-t"></p></div>
  </div>
  <div class="pv-card">
    <p class="pv-card-label">PV produkcja</p>
    <p class="pv-card-value" id="pv-pv">—</p>
  </div>
  <div class="pv-card">
    <p class="pv-card-label">Tomek L1</p>
    <p class="pv-card-value" id="pv-l1">—</p>
  </div>
  <div class="pv-card">
    <p class="pv-card-label">Lonia L2</p>
    <p class="pv-card-value" id="pv-l2">—</p>
  </div>
  <div class="pv-card">
    <p class="pv-card-label">Henia L3</p>
    <p class="pv-card-value" id="pv-l3">—</p>
  </div>
  <div class="pv-card">
    <p class="pv-card-label">Suma zużycia</p>
    <p class="pv-card-value" id="pv-sum">—</p>
  </div>
</div>
<div class="pv-lastbar">
  <div class="pv-lastbar-title">Ostatni pomiar źródłowy</div>
  <div class="pv-lastbar-grid">
    <div class="pv-last-item"><b>PV</b><span id="last-pv">—</span></div>
    <div class="pv-last-item"><b>Tomek L1</b><span id="last-l1">—</span></div>
    <div class="pv-last-item"><b>Lonia L2</b><span id="last-l2">—</span></div>
    <div class="pv-last-item"><b>Henia L3</b><span id="last-l3">—</span></div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function fmtW(n) {
  if (n == null || Number.isNaN(n)) return '—';
  return Math.round(n) + ' W';
}
function splitTimeForDisplay(s) {
  if (!s || s === '—') return { d: '—', t: '' };
  var m = String(s).match(/^(\d{4})-(\d{2})-(\d{2})[\sT](\d{2}:\d{2}:\d{2})/);
  if (m) return { d: m[3] + '-' + m[2] + '-' + m[1], t: m[4] };
  return { d: s, t: '' };
}
function tsStackText(s) {
  var x = splitTimeForDisplay(s);
  return x.t ? (x.d + ' ' + x.t) : x.d;
}
async function tick() {
  const st = document.getElementById('pv-status');
  try {
    const r = await fetch('/api/live');
    const j = await r.json();
    if (!j.ok) {
      st.textContent = j.error || 'Brak danych w bazie';
      return;
    }
    st.textContent = 'Źródło: ostatni rekord z bazy (odświeżanie co 2 s)';
    var ts = splitTimeForDisplay(j.time || '');
    document.getElementById('pv-time-d').textContent = ts.d;
    document.getElementById('pv-time-t').textContent = ts.t;
    document.getElementById('pv-pv').textContent = fmtW(j.pv_w);
    document.getElementById('pv-l1').textContent = fmtW(j.l1_w);
    document.getElementById('pv-l2').textContent = fmtW(j.l2_w);
    document.getElementById('pv-l3').textContent = fmtW(j.l3_w);
    const sum = (j.l1_w||0)+(j.l2_w||0)+(j.l3_w||0);
    document.getElementById('pv-sum').textContent = fmtW(sum);
    document.getElementById('last-pv').textContent = tsStackText(j.pv_ts || '');
    document.getElementById('last-l1').textContent = tsStackText(j.l1_ts || '');
    document.getElementById('last-l2').textContent = tsStackText(j.l2_ts || '');
    document.getElementById('last-l3').textContent = tsStackText(j.l3_ts || '');
  } catch (e) {
    st.textContent = 'Błąd sieci: ' + e;
  }
}
tick();
setInterval(tick, 2000);
</script>
{% endblock %}
